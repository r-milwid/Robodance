<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Robodance</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preload" href="assets/Curtain Left.png" as="image">
  <link rel="preload" href="assets/Curtain Right.png" as="image">
</head>
<body>
  <div class="curtain curtain-left"></div>
  <div class="curtain curtain-right"></div>
  <div class="show-intro-overlay" aria-hidden="false">
    <div class="show-intro-modal" role="dialog" aria-modal="true" aria-labelledby="show-intro-title">
      <p class="show-intro-kicker" id="show-intro-title">
        Show starts in <span data-countdown>10</span>
      </p>
      <p class="show-intro-copy">This isn't for everyone. Some call it art. Some wish they'd stayed away.</p>
      <p class="show-intro-copy">Sound on if you're staying.</p>
      <p class="show-intro-copy">If not, leave now while you still can.</p>
    </div>
  </div>
  <script src="dance.js"></script>
</body>
</html>
